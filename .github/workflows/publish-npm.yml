name: Build CE Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ce_plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rustfmt Check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Release Build
        run: cargo build --release
